services:
  app:
    image: mcr.microsoft.com/devcontainers/php:1-8.3-bookworm
    command: sleep infinity
    volumes:
      - ../..:/workspaces:cached
    depends_on:
      - db
    environment:
      DB_HOST: db

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: curriculum_service
    volumes:
      - db-data:/var/lib/mysql
      # Diimpor OTOMATIS hanya saat volume database pertama kali dibuat.
      - ./db/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro

volumes:
  db-data:
