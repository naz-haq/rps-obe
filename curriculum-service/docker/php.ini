memory_limit = 256M
upload_max_filesize = 25M
post_max_size = 26M
max_execution_time = 120

opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0
opcache.jit = tracing
opcache.jit_buffer_size = 64M

expose_php = Off
