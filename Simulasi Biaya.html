<div id="app-root"></div>

<style>
  :root {
    --paper: #edeade;
    --paper-raised: #f7f5ec;
    --ink: #1c2333;
    --ink-soft: #52586b;
    --primary: #223a5e;
    --primary-soft: #3a5478;
    --accent: #a9791f;
    --accent-live: #a63a2e;
    --line: #d6cfb9;
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --serif: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Times New Roman', serif;
    --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  #app-root {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--paper);
    padding: 32px 20px 60px;
    min-height: 100%;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  .wrap { max-width: 1080px; margin: 0 auto; }

  .masthead {
    border-bottom: 3px double var(--ink);
    padding-bottom: 18px;
    margin-bottom: 28px;
  }
  .masthead .eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-live);
    margin-bottom: 6px;
  }
  .masthead h1 {
    font-family: var(--serif);
    font-size: clamp(26px, 4vw, 38px);
    margin: 0 0 8px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .masthead p {
    font-size: 14.5px;
    color: var(--ink-soft);
    max-width: 640px;
    line-height: 1.55;
    margin: 0;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
  }
  @media (min-width: 880px) {
    .grid { grid-template-columns: 380px 1fr; align-items: start; }
  }

  .card {
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 22px;
  }
  .card + .card { margin-top: 20px; }

  .card h2 {
    font-family: var(--serif);
    font-size: 17px;
    margin: 0 0 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }

  label {
    display: block;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin: 14px 0 6px;
  }
  label:first-of-type { margin-top: 0; }

  input[type="text"], textarea, select, input[type="number"] {
    width: 100%;
    font-family: var(--sans);
    font-size: 14px;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: #fff;
    color: var(--ink);
  }
  textarea { resize: vertical; line-height: 1.5; }
  input:focus, textarea:focus, select:focus, button:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 1px;
  }

  .mk-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .mk-row input { flex: 1; }
  .mk-row button {
    background: none; border: 1px solid var(--line); color: var(--ink-soft);
    width: 32px; border-radius: 2px; cursor: pointer; font-size: 15px;
  }
  .add-mk {
    font-family: var(--mono);
    font-size: 12px;
    background: none;
    border: 1px dashed var(--line);
    color: var(--primary);
    padding: 6px 10px;
    border-radius: 2px;
    cursor: pointer;
    margin-top: 4px;
  }
  .add-mk:hover { background: #fff; }

  .model-options { display: flex; flex-direction: column; gap: 8px; }
  .model-opt {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid var(--line); border-radius: 2px;
    padding: 10px 12px; cursor: pointer; background: #fff;
  }
  .model-opt input { width: auto; }
  .model-opt .m-name { font-weight: 600; font-size: 14px; }
  .model-opt .m-tag {
    font-family: var(--mono); font-size: 10px; padding: 2px 6px;
    border-radius: 10px; margin-left: auto; letter-spacing: 0.04em;
  }
  .tag-live { background: #f6e3e0; color: var(--accent-live); }
  .tag-calc { background: #e9e4d4; color: var(--ink-soft); }

  .rates { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .rates .full { grid-column: 1 / -1; }

  button.primary {
    width: 100%;
    background: var(--primary);
    color: #fff;
    border: none;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 14.5px;
    padding: 12px;
    border-radius: 2px;
    cursor: pointer;
    margin-top: 18px;
    transition: background 0.15s ease;
  }
  button.primary:hover { background: var(--primary-soft); }
  button.primary:disabled { background: #b9b6ab; cursor: not-allowed; }

  .hint { font-size: 12px; color: var(--ink-soft); margin-top: 6px; line-height: 1.5; }
  .error-box {
    background: #f6e3e0; border: 1px solid #d9a99f; color: #7a2c22;
    padding: 10px 12px; border-radius: 2px; font-size: 13px; margin-top: 12px;
  }

  /* OUTPUT DOCUMENT */
  .doc-panel {
    background: #fff;
    border: 1px solid var(--line);
    min-height: 220px;
    padding: 26px 28px;
    font-family: var(--serif);
    font-size: 14.5px;
    line-height: 1.7;
    white-space: pre-wrap;
  }
  .doc-panel .placeholder {
    font-family: var(--sans);
    color: var(--ink-soft);
    font-style: italic;
    font-size: 13.5px;
  }
  .doc-panel .loading {
    font-family: var(--mono); font-size: 13px; color: var(--primary);
  }
  .doc-panel h3 { font-family: var(--serif); }

  /* RECEIPT */
  .receipt-wrap { margin-top: 20px; display: flex; justify-content: center; }
  .receipt {
    width: 100%;
    max-width: 420px;
    background: #fffdf7;
    border: 1px solid var(--line);
    box-shadow: 0 2px 10px rgba(28,35,51,0.08);
    padding: 20px 22px 24px;
    font-family: var(--mono);
    font-size: 12.5px;
    position: relative;
  }
  .receipt::before {
    content: "";
    position: absolute; top: -1px; left: 0; right: 0; height: 8px;
    background-image: linear-gradient(-45deg, var(--paper) 6px, transparent 0),
                       linear-gradient(45deg, var(--paper) 6px, transparent 0);
    background-position: left top;
    background-repeat: repeat-x;
    background-size: 12px 12px;
  }
  .receipt .r-title {
    text-align: center; font-family: var(--serif); font-size: 15px;
    letter-spacing: 0.02em; margin-bottom: 2px; color: var(--ink);
  }
  .receipt .r-sub {
    text-align: center; font-size: 10.5px; color: var(--ink-soft);
    margin-bottom: 14px; letter-spacing: 0.04em;
  }
  .receipt .r-line { display: flex; justify-content: space-between; padding: 3px 0; }
  .receipt .r-line.dim { color: var(--ink-soft); }
  .receipt .r-div { border-top: 1px dashed var(--line); margin: 10px 0; }
  .receipt .r-total { display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; padding-top: 4px; }
  .receipt .r-total .amt { color: var(--accent); }
  .receipt .r-note { font-size: 10px; color: var(--ink-soft); margin-top: 12px; line-height: 1.5; }
  .receipt .r-stamp {
    position: absolute; top: 16px; right: 18px;
    font-family: var(--sans); font-size: 9.5px; font-weight: 700;
    letter-spacing: 0.08em; padding: 3px 7px; border: 1.5px solid var(--accent-live);
    color: var(--accent-live); border-radius: 3px; transform: rotate(4deg);
  }

  /* COMPARISON TABLE */
  .compare-card { margin-top: 28px; }
  table.compare { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.compare th, table.compare td {
    text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--line);
  }
  table.compare th {
    font-family: var(--mono); font-size: 10.5px; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--ink-soft); font-weight: 600;
  }
  table.compare td.num { font-family: var(--mono); text-align: right; }
  table.compare tr.empty td { color: var(--ink-soft); font-style: italic; }

  footer.note {
    margin-top: 30px; font-size: 12px; color: var(--ink-soft);
    border-top: 1px solid var(--line); padding-top: 14px; line-height: 1.6;
  }
</style>

<script type="text/babel">
const { useState } = React;

const MODELS = {
  claude: {
    label: "Claude Sonnet",
    tag: "LIVE",
    tagClass: "tag-live",
    defaultIn: 3,
    defaultOut: 15,
  },
  gpt: {
    label: "GPT-5.5",
    tag: "KALKULATOR",
    tagClass: "tag-calc",
    defaultIn: 5,
    defaultOut: 30,
  },
  gemini: {
    label: "Gemini 3.1 Pro",
    tag: "KALKULATOR",
    tagClass: "tag-calc",
    defaultIn: 2,
    defaultOut: 12,
  },
};

function estimateTokens(text) {
  if (!text) return 0;
  return Math.max(1, Math.round(text.trim().length / 4));
}

function buildPrompt(bahanKajian, mkList) {
  const mkText = mkList.filter(Boolean).map((m, i) => `${i + 1}. ${m}`).join("\n");
  return `Kamu adalah pakar kurikulum pendidikan tinggi berbasis OBE (Outcome Based Education) di Indonesia.

Ada satu bahan kajian/keterampilan berikut yang diklaim oleh lebih dari satu mata kuliah:

Bahan Kajian/Keterampilan: "${bahanKajian}"

Mata kuliah yang mengklaim:
${mkText}

Tugas: buat analisis kesesuaian singkat dalam format berikut, dalam Bahasa Indonesia:
1. Untuk tiap mata kuliah, jelaskan fokus yang seharusnya diajarkan (1-2 kalimat), dan level Bloom yang relevan.
2. Nilai apakah ini overlap istilah semata (konteks beda) atau duplikasi nyata (konteks & level sama).
3. Berikan rekomendasi konkret: apakah perlu spesifikasi redaksi bahan kajian per MK, atau scaffolding berjenjang antar semester.
4. Tutup dengan status ringkas: SESUAI / PERLU_KLARIFIKASI / DUPLIKASI.

Format output rapi dengan heading singkat per bagian, tidak perlu markdown table, cukup teks terstruktur.`;
}

function Receipt({ model, inputTokens, outputTokens, rateIn, rateOut, idrRate, live }) {
  const cost = (inputTokens / 1e6) * rateIn + (outputTokens / 1e6) * rateOut;
  const costIdr = cost * idrRate;
  return (
    <div className="receipt">
      {live && <div className="r-stamp">LIVE</div>}
      <div className="r-title">Struk Penggunaan Token</div>
      <div className="r-sub">{MODELS[model].label}</div>
      <div className="r-line"><span>Token input</span><span>{inputTokens.toLocaleString('id-ID')}</span></div>
      <div className="r-line"><span>Token output</span><span>{outputTokens.toLocaleString('id-ID')}</span></div>
      <div className="r-div"></div>
      <div className="r-line dim"><span>Tarif input / 1M tkn</span><span>${rateIn.toFixed(2)}</span></div>
      <div className="r-line dim"><span>Tarif output / 1M tkn</span><span>${rateOut.toFixed(2)}</span></div>
      <div className="r-div"></div>
      <div className="r-total"><span>Total (USD)</span><span className="amt">${cost.toFixed(5)}</span></div>
      <div className="r-line dim"><span>≈ Rupiah</span><span>Rp {costIdr.toLocaleString('id-ID', {maximumFractionDigits: 0})}</span></div>
      <div className="r-note">
        {live
          ? "Jumlah token diambil langsung dari respons API (angka pasti)."
          : "Jumlah token adalah ESTIMASI (≈karakter/4), bukan hasil tokenisasi resmi model ini. Kurs IDR ilustratif — sesuaikan sendiri."}
      </div>
    </div>
  );
}

function App() {
  const [bahanKajian, setBahanKajian] = useState("Pengecilan/reduksi ukuran partikel bahan padat");
  const [mkList, setMkList] = useState([
    "Praktikum Compounding Sediaan Farmasi",
    "Praktikum Fitokimia",
    "Praktikum Kimia Sintesis",
  ]);
  const [selectedModel, setSelectedModel] = useState("claude");
  const [rates, setRates] = useState({
    claude: { in: 3, out: 15 },
    gpt: { in: 5, out: 30 },
    gemini: { in: 2, out: 12 },
  });
  const [idrRate, setIdrRate] = useState(16300);

  const [pasteText, setPasteText] = useState("");
  const [loading, setLoading] = useState(false);
  const [errorMsg, setErrorMsg] = useState("");
  const [results, setResults] = useState({}); // { claude: {doc, inTok, outTok, live}, gpt: {...}, gemini: {...} }

  const updateMk = (i, val) => {
    const copy = [...mkList]; copy[i] = val; setMkList(copy);
  };
  const removeMk = (i) => setMkList(mkList.filter((_, idx) => idx !== i));
  const addMk = () => setMkList([...mkList, ""]);

  const updateRate = (model, field, val) => {
    setRates({ ...rates, [model]: { ...rates[model], [field]: parseFloat(val) || 0 } });
  };

  const runClaude = async () => {
    setLoading(true); setErrorMsg("");
    try {
      const prompt = buildPrompt(bahanKajian, mkList);
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }],
        }),
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message || "Gagal memanggil API");
      const text = (data.content || []).map(b => b.text || "").join("\n").trim();
      const usage = data.usage || {};
      const inTok = usage.input_tokens ?? estimateTokens(prompt);
      const outTok = usage.output_tokens ?? estimateTokens(text);
      setResults({ ...results, claude: { doc: text, inTok, outTok, live: true } });
    } catch (e) {
      setErrorMsg("Gagal generate: " + e.message + ". Coba lagi sebentar lagi.");
    } finally {
      setLoading(false);
    }
  };

  const computePasted = () => {
    if (!pasteText.trim()) { setErrorMsg("Tempel dulu teks hasil generate dari model ini."); return; }
    setErrorMsg("");
    const prompt = buildPrompt(bahanKajian, mkList);
    const inTok = estimateTokens(prompt);
    const outTok = estimateTokens(pasteText);
    setResults({ ...results, [selectedModel]: { doc: pasteText, inTok, outTok, live: false } });
  };

  const current = results[selectedModel];
  const filledModels = Object.keys(results);

  return (
    <div className="wrap">
      <div className="masthead">
        <div className="eyebrow">Simulator &middot; Generate Dokumen &amp; Biaya Token</div>
        <h1>Uji Coba Analisis Kesesuaian Bahan Kajian</h1>
        <p>Masukkan satu kasus bahan kajian yang diklaim beberapa mata kuliah, pilih model, lalu bandingkan dokumen hasil generate beserta jumlah token dan estimasi biayanya.</p>
      </div>

      <div className="grid">
        {/* LEFT: FORM */}
        <div>
          <div className="card">
            <h2>1. Kasus Uji</h2>
            <label>Bahan Kajian / Keterampilan</label>
            <input type="text" value={bahanKajian} onChange={e => setBahanKajian(e.target.value)} />

            <label>Mata Kuliah Pengklaim</label>
            {mkList.map((mk, i) => (
              <div className="mk-row" key={i}>
                <input type="text" value={mk} onChange={e => updateMk(i, e.target.value)} placeholder={`Mata kuliah ${i + 1}`} />
                <button type="button" onClick={() => removeMk(i)} aria-label="Hapus">&times;</button>
              </div>
            ))}
            <button type="button" className="add-mk" onClick={addMk}>+ Tambah mata kuliah</button>
          </div>

          <div className="card">
            <h2>2. Pilih Model</h2>
            <div className="model-options">
              {Object.keys(MODELS).map(key => (
                <label className="model-opt" key={key}>
                  <input type="radio" name="model" checked={selectedModel === key} onChange={() => { setSelectedModel(key); setErrorMsg(""); }} />
                  <span className="m-name">{MODELS[key].label}</span>
                  <span className={"m-tag " + MODELS[key].tagClass}>{MODELS[key].tag}</span>
                </label>
              ))}
            </div>

            <label>Tarif per 1 Juta Token (USD) &mdash; bisa disesuaikan</label>
            <div className="rates">
              <input type="number" step="0.1" value={rates[selectedModel].in} onChange={e => updateRate(selectedModel, "in", e.target.value)} title="Tarif input" />
              <input type="number" step="0.1" value={rates[selectedModel].out} onChange={e => updateRate(selectedModel, "out", e.target.value)} title="Tarif output" />
            </div>
            <div className="hint">Kiri = input, kanan = output. Harga default per per&iexcl;kiraan Jul 2026 &mdash; cek ulang situs resmi tiap model sebelum dipakai untuk keputusan nyata.</div>

            <label>Kurs USD → IDR (ilustratif)</label>
            <input type="number" value={idrRate} onChange={e => setIdrRate(parseFloat(e.target.value) || 0)} />

            {selectedModel === "claude" ? (
              <button className="primary" onClick={runClaude} disabled={loading}>
                {loading ? "Menghasilkan dokumen..." : "Generate Langsung (Live API)"}
              </button>
            ) : (
              <>
                <label style={{marginTop: '16px'}}>Tempel hasil generate dari {MODELS[selectedModel].label}</label>
                <textarea rows="6" value={pasteText} onChange={e => setPasteText(e.target.value)} placeholder={`Jalankan prompt yang sama di ${MODELS[selectedModel].label} secara manual, lalu tempel hasilnya di sini untuk dihitung estimasi biayanya.`}></textarea>
                <button className="primary" onClick={computePasted}>Hitung Estimasi Biaya</button>
              </>
            )}
            {errorMsg && <div className="error-box">{errorMsg}</div>}
          </div>
        </div>

        {/* RIGHT: OUTPUT */}
        <div>
          <div className="card">
            <h2>3. Dokumen Hasil Generate — {MODELS[selectedModel].label}</h2>
            <div className="doc-panel">
              {loading && <div className="loading">&#9679; Memanggil model, mohon tunggu...</div>}
              {!loading && current && current.doc}
              {!loading && !current && (
                <div className="placeholder">
                  Belum ada hasil untuk model ini. {selectedModel === "claude" ? 'Klik "Generate Langsung" di panel kiri.' : "Tempel hasil generate manual lalu hitung biayanya."}
                </div>
              )}
            </div>

            {current && (
              <div className="receipt-wrap">
                <Receipt
                  model={selectedModel}
                  inputTokens={current.inTok}
                  outputTokens={current.outTok}
                  rateIn={rates[selectedModel].in}
                  rateOut={rates[selectedModel].out}
                  idrRate={idrRate}
                  live={current.live}
                />
              </div>
            )}
          </div>

          <div className="card compare-card">
            <h2>4. Perbandingan Antar Model</h2>
            <table className="compare">
              <thead>
                <tr>
                  <th>Model</th>
                  <th className="num">Token In</th>
                  <th className="num">Token Out</th>
                  <th className="num">Biaya (USD)</th>
                  <th className="num">Biaya (IDR)</th>
                </tr>
              </thead>
              <tbody>
                {Object.keys(MODELS).map(key => {
                  const r = results[key];
                  if (!r) {
                    return (
                      <tr className="empty" key={key}>
                        <td>{MODELS[key].label}</td>
                        <td className="num" colSpan="4">belum diuji</td>
                      </tr>
                    );
                  }
                  const cost = (r.inTok / 1e6) * rates[key].in + (r.outTok / 1e6) * rates[key].out;
                  return (
                    <tr key={key}>
                      <td>{MODELS[key].label}{r.live ? " (live)" : " (estimasi)"}</td>
                      <td className="num">{r.inTok.toLocaleString('id-ID')}</td>
                      <td className="num">{r.outTok.toLocaleString('id-ID')}</td>
                      <td className="num">${cost.toFixed(5)}</td>
                      <td className="num">Rp {(cost * idrRate).toLocaleString('id-ID', {maximumFractionDigits: 0})}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <footer className="note">
            Catatan: hanya Claude yang benar-benar dipanggil langsung dari halaman ini (token dari respons API asli). Untuk GPT-5.5 dan Gemini, tidak ada koneksi API langsung di sini — jalankan prompt yang sama secara manual di platform masing-masing, lalu tempel hasilnya untuk dihitung estimasi biayanya berdasarkan tarif yang bisa Anda sesuaikan.
          </footer>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
